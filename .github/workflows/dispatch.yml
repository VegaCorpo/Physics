name: Dispatch

on:
  workflow_call:
    inputs:
      repository:
        required: True
        type: string
    secrets:
      PAT:
        required: true

jobs:
    Dispatch:
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main'
      permissions:
        contents: write
      steps:
        - name: Repository Dispatch
          uses: peter-evans/repository-dispatch@v4
          with:
            token: ${{ secrets.PAT }}
            repository: VegaCorpo/OrbitalEngine
            event-type: update-submodules
